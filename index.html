<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia AI - Recherche Abjad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f5f5dc 0%, #e8e8c8 100%); 
            color: #2c3e50; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #d4af37; font-size: 2.5rem; margin-bottom: 10px; }
        
        .search-box { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="number"] { 
            flex: 1; 
            padding: 14px 20px; 
            border: 2px solid #e0e0e0; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none; 
        }
        input[type="number"]:focus { border-color: #d4af37; }
        
        .system-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { 
            flex: 1; 
            padding: 10px; 
            border: 2px solid #d4af37; 
            background: white; 
            color: #2c3e50; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .toggle-btn.active { background: #d4af37; color: white; }
        
        .search-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #2d5016, #1e360e); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
        }
        .search-btn:hover { transform: translateY(-2px); }
        .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .results { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            min-height: 400px; 
        }
        .results h2 { color: #d4af37; margin-bottom: 20px; }
        
        .result-item { 
            background: #fafafa; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border-left: 4px solid #d4af37; 
        }
        .result-item .arabic { 
            font-size: 1.3rem; 
            text-align: right; 
            direction: rtl; 
            margin: 10px 0; 
        }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .no-results { text-align: center; padding: 40px; color: #999; }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .stat-card { 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
        }
        .stat-card .number { font-size: 2rem; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 Sophia AI</h1>
            <p>Recherche Abjad dans le Coran</p>
        </div>

        <div class="search-box">
            <div class="input-group">
                <input type="number" id="searchValue" placeholder="Entrez une valeur (ex: 2713)" min="1">
            </div>
            
            <div class="system-toggle">
                <button class="toggle-btn active" onclick="setSystem('mashriqi')" id="btn-mashriqi">📖 Oriental</button>
                <button class="toggle-btn" onclick="setSystem('maghribi')" id="btn-maghribi">🕌 Maghrébin</button>
            </div>
            
            <button class="search-btn" onclick="searchByValue()" id="searchBtn">🔍 Rechercher</button>
        </div>

        <div class="results" id="results">
            <h2>Résultats</h2>
            <p style="text-align: center; color: #999; padding: 40px;">
                Entrez une valeur et cliquez sur "Rechercher"
            </p>
        </div>
    </div>

    <script>
        // VALEURS ABJAD
        const ABJAD_VALUES = {
            mashriqi: {
                'ا': 1, 'ب': 2, 'ج': 3, 'د': 4, 'ه': 5, 'و': 6, 'ز': 7, 'ح': 8, 'ط': 9,
                'ي': 10, 'ك': 20, 'ل': 30, 'م': 40, 'ن': 50, 'س': 60, 'ع': 70, 'ف': 80, 'ص': 90,
                'ق': 100, 'ر': 200, 'ش': 300, 'ت': 400, 'ث': 500, 'خ': 600, 'ذ': 700, 'ض': 800, 'ظ': 900, 'غ': 1000
            },
            maghribi: {
                'ا': 1, 'ب': 2, 'ج': 3, 'د': 4, 'ه': 5, 'و': 6, 'ز': 7, 'ح': 8, 'ط': 9,
                'ي': 10, 'ك': 20, 'ل': 30, 'م': 40, 'ن': 50, 'ص': 60, 'ع': 70, 'ف': 80, 'ض': 90,
                'ق': 100, 'ر': 200, 'س': 300, 'ت': 400, 'ث': 500, 'خ': 600, 'ذ': 700, 'ظ': 800, 'غ': 900, 'ش': 1000
            }
        };

        let currentSystem = 'mashriqi';
        let quranData = null;

        function calculateAbjad(text) {
            let total = 0;
            for (let char of text) {
                if (ABJAD_VALUES[currentSystem][char]) {
                    total += ABJAD_VALUES[currentSystem][char];
                }
            }
            return total;
        }

        function setSystem(system) {
            currentSystem = system;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${system}`).classList.add('active');
        }

        async function loadQuranData() {
            if (quranData) return quranData;
            try {
                const response = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
                const data = await response.json();
                if (data.code === 200) {
                    quranData = data.data.surahs;
                    return quranData;
                }
            } catch (error) {
                console.error('Erreur API:', error);
                throw error;
            }
        }

        async function searchByValue() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (!value || value < 1) {
                alert('Veuillez entrer une valeur valide');
                return;
            }

            const resultsDiv = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');
            
            searchBtn.disabled = true;
            resultsDiv.innerHTML = '<div class="loading">Chargement et calcul en cours...</div>';

            try {
                const surahs = await loadQuranData();
                const results = { surahs: [], verses: [], words: [] };

                // Chercher dans les sourates
                for (let surah of surahs) {
                    const nameValue = calculateAbjad(surah.name);
                    if (nameValue === value) {
                        results.surahs.push({
                            type: 'name',
                            number: surah.number,
                            name: surah.name,
                            englishName: surah.englishName,
                            value: nameValue
                        });
                    }
                    if (surah.number === value) {
                        results.surahs.push({
                            type: 'number',
                            number: surah.number,
                            name: surah.name,
                            englishName: surah.englishName,
                            value: surah.number
                        });
                    }
                }

                // Chercher dans les versets
                for (let surah of surahs) {
                    for (let ayah of surah.ayahs) {
                        const ayahValue = calculateAbjad(ayah.text);
                        if (ayahValue === value) {
                            results.verses.push({
                                surah: surah.englishName,
                                surahArabic: surah.name,
                                number: ayah.numberInSurah,
                                text: ayah.text,
                                value: ayahValue
                            });
                        }
                    }
                }

                // Chercher dans les mots (limité)
                let wordCount = 0;
                for (let surah of surahs.slice(0, 10)) {
                    if (wordCount >= 100) break;
                    for (let ayah of surah.ayahs.slice(0, 5)) {
                        const words = ayah.text.split(' ');
                        for (let word of words) {
                            if (wordCount >= 100) break;
                            const wordValue = calculateAbjad(word);
                            if (wordValue === value) {
                                results.words.push({
                                    word: word,
                                    surah: surah.englishName,
                                    ayah: ayah.numberInSurah,
                                    value: wordValue
                                });
                                wordCount++;
                            }
                        }
                    }
                }

                displayResults(value, results);
            } catch (error) {
                resultsDiv.innerHTML = '<div class="no-results">❌ Erreur de chargement. Vérifiez votre connexion.</div>';
            } finally {
                searchBtn.disabled = false;
            }
        }

        function displayResults(value, results) {
            const resultsDiv = document.getElementById('results');
            let html = `<h2>Résultats pour ${value} (${currentSystem === 'mashriqi' ? 'Oriental' : 'Maghrébin'})</h2>`;
            
            html += `<div class="stats">
                <div class="stat-card"><div class="number">${results.surahs.length}</div><div class="label">Sourates</div></div>
                <div class="stat-card"><div class="number">${results.verses.length}</div><div class="label">Versets</div></div>
                <div class="stat-card"><div class="number">${results.words.length}</div><div class="label">Mots</div></div>
            </div>`;

            if (results.surahs.length > 0) {
                html += '<h3>📖 Sourates</h3>';
                results.surahs.forEach(s => {
                    html += `<div class="result-item">
                        <strong>Sourate ${s.number}: ${s.englishName}</strong>
                        <div class="arabic">${s.name}</div>
                        <div>Type: ${s.type === 'name' ? 'Nom' : 'Numéro'} | Valeur: ${s.value}</div>
                    </div>`;
                });
            }

            if (results.verses.length > 0) {
                html += '<h3>🕌 Versets</h3>';
                results.verses.forEach(v => {
                    html += `<div class="result-item">
                        <strong>${v.surah} - Verset ${v.number}</strong>
                        <div class="arabic">${v.text}</div>
                        <div>Valeur: ${v.value}</div>
                    </div>`;
                });
            }

            if (results.words.length > 0) {
                html += '<h3>📝 Mots</h3>';
                results.words.forEach(w => {
                    html += `<div class="result-item">
                        <div class="arabic">${w.word}</div>
                        <div>${w.surah} - Verset ${w.ayah} | Valeur: ${w.value}</div>
                    </div>`;
                });
            }

            if (results.surahs.length === 0 && results.verses.length === 0 && results.words.length === 0) {
                html += '<div class="no-results">Aucun résultat trouvé</div>';
            }

            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
