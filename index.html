<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia AI - AdadFinder</title>
    <script src="data.js"></script>
<script src="quran-api.js"></script>
<script src="search-engine.js"></script>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#d4af37">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Assistant IA spécialisé dans la numérologie islamique et les valeurs Abjad">
    <meta property="og:title" content="Sophia AI - AdadFinder">
    <meta property="og:description" content="Calculateur de valeurs Abjad et assistant islamique">
    <meta property="og:image" content="preview.jpg">
    
    <style>
        :root {
            --bg-primary: #f5f5dc;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --accent-gold: #d4af37;
            --accent-green: #2d5016;
            --border-color: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #eaeaea;
            --accent-gold: #ffd700;
            --accent-green: #4a7c59;
            --border-color: #3a3a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .theme-toggle {
            background: var(--accent-gold);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .chat-container {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .messages {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 10px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: var(--accent-gold);
            color: white;
            margin-left: 20%;
            text-align: right;
        }

        .ai-message {
            background: var(--border-color);
            margin-right: 20%;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
        }

        button.send-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        button.send-btn:hover {
            transform: scale(1.05);
        }

        .history-panel {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: var(--bg-secondary);
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
        }

        .history-panel.open {
            right: 0;
        }

        .history-item {
            padding: 10px;
            margin: 10px 0;
            background: var(--bg-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(-5px);
        }

        .toggle-history {
            position: fixed;
            right: 20px;
            top: 20px;
            background: var(--accent-gold);
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 1000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .user-message {
                margin-left: 10%;
            }
            
            .ai-message {
                margin-right: 10%;
            }
            
            .history-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
    <button class="toggle-history" onclick="toggleHistory()">📜</button>
    
    <div class="container">
        <div class="header">
            <h1>🌙 Sophia AI</h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages"></div>
            
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Posez votre question..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <div class="history-panel" id="historyPanel">
        <h2>Historique</h2>
        <div id="historyList"></div>
        <button onclick="clearHistory()" style="width: 100%; padding: 10px; margin-top: 20px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer;">
            Effacer l'historique
        </button>
    </div>

    <script>
        // ===== MODE SOMBRE/CLAIR =====
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Charger le thème sauvegardé
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        // ===== HISTORIQUE DES CONVERSATIONS =====
        let conversations = JSON.parse(localStorage.getItem('conversations')) || [];
        let currentConversation = [];

        function toggleHistory() {
            document.getElementById('historyPanel').classList.toggle('open');
            loadHistory();
        }

        function saveConversation() {
            if (currentConversation.length > 0) {
                const title = currentConversation[0].text.substring(0, 30) + '...';
                conversations.push({
                    id: Date.now(),
                    title: title,
                    messages: currentConversation,
                    date: new Date().toLocaleDateString('fr-FR')
                });
                localStorage.setItem('conversations', JSON.stringify(conversations));
                currentConversation = [];
            }
        }

        function loadHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            conversations.reverse().forEach(conv => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <strong>${conv.title}</strong>
                    <br><small>${conv.date}</small>
                `;
                item.onclick = () => loadConversation(conv);
                historyList.appendChild(item);
            });
        }

        function loadConversation(conv) {
            document.getElementById('messages').innerHTML = '';
            conv.messages.forEach(msg => {
                displayMessage(msg.text, msg.type, false);
            });
            toggleHistory();
        }

        function clearHistory() {
            if (confirm('Êtes-vous sûr de vouloir effacer tout l\'historique ?')) {
                conversations = [];
                localStorage.removeItem('conversations');
                loadHistory();
            }
        }

        // ===== CHAT =====
        function displayMessage(text, type, save = true) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (save) {
                currentConversation.push({ text, type, time: Date.now() });
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;

            displayMessage(text, 'user');
            input.value = '';

            // Simuler une réponse IA (à remplacer par ton API)
            setTimeout(() => {
                const response = getAIResponse(text);
                displayMessage(response, 'ai');
                
                // Sauvegarder après chaque échange
                if (currentConversation.length >= 2) {
                    saveConversation();
                }
            }, 500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function getAIResponse(text) {
            // Logique de réponse basique - à remplacer par ton système
            if (text.toLowerCase().includes('abjad')) {
                return "La valeur Abjad est un système de numérotation des lettres arabes...";
            }
            return "Je suis Sophia AI, spécialisée dans la numérologie islamique. Posez-moi une question sur les valeurs Abjad, les 99 noms d'Allah, ou les sourates !";
        }

        // ===== PWA =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
