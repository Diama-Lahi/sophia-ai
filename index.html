<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sophia AI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <header>
    <h1>Sophia AI</h1>
  </header>

  <main>
    <div id="chat-box"></div>

    <div id="input-zone">
      <input id="user-input" type="text" placeholder="Écris un message…">
      <button id="send-btn">Envoyer</button>
    </div>

    <div id="image-zone">
      <input type="file" id="image-input">
      <input type="text" id="image-prompt" placeholder="Décris la modification…">
      <button id="edit-btn">Modifier l’image</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
